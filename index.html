        });

        content = `
          <div class="h-full flex flex-col p-4 sm:p-6 animate-in fade-in duration-300">
            <div class="flex gap-1 mb-6">${dots}</div>
            <div class="flex-1 overflow-y-auto bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-xl flex flex-col relative">
              <h2 class="text-xl font-bold text-white mb-4 border-b border-slate-700 pb-4">${card.title}</h2>
              <div class="space-y-4 text-slate-200 leading-relaxed text-sm font-medium">
                ${formattedText.split('\n\n').map(p => `<p>${p}</p>`).join('')}
              </div>
            </div>
            <button onclick="nextTheory()" class="mt-6 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-6 rounded-xl w-full flex justify-center items-center gap-2 shadow-lg">
              ${state.step < level.theory.length - 1 ? 'Дальше' : 'К заданиям'} <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
          </div>
        `;
      } 
      else if (state.phase === 'tasks') {
        const task = level.tasks[state.currentTaskIndex];
        const progressW = ((state.currentTaskIndex + 1) / level.tasks.length) * 100;
        
        let taskHtml = '';
        if (task.type === 'mcq') taskHtml = renderMCQ(task);
        if (task.type === 'tf') taskHtml = renderTF(task);
        if (task.type === 'order') taskHtml = renderOrder(task);
        if (task.type === 'match') taskHtml = renderMatch(task);

        content = `
          <div class="h-full flex flex-col">
            <div class="px-6 pt-4 pb-2">
              <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Миссия ${state.currentTaskIndex + 1} / ${level.tasks.length}</span>
              <div class="h-1.5 bg-slate-800 rounded-full w-full overflow-hidden mt-2">
                <div class="h-full bg-cyan-500 transition-all duration-500" style="width: ${progressW}%"></div>
              </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col">${taskHtml}</div>
          </div>
        `;
      }
      else if (state.phase === 'result') {
        content = `
          <div class="h-full flex flex-col items-center justify-center p-6 text-center animate-in zoom-in duration-500">
            <div class="w-24 h-24 bg-emerald-600 rounded-full flex items-center justify-center mb-6 shadow-lg">
              <i data-lucide="star" class="text-white w-12 h-12 fill-white"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 text-white">Тема пройдена!</h2>
            <p class="text-slate-400 mb-8">Отличная работа. Вы усвоили причины и следствия исторических событий.</p>
            <button onclick="finishLevel()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
              Вернуться на карту
            </button>
          </div>
        `;
      }

      return `
        <div class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shadow-md">
          <button onclick="goMap()" class="text-slate-400 hover:text-white flex items-center gap-1">
            <i data-lucide="chevron-left" class="w-5 h-5"></i> <span class="text-sm font-medium">Карта</span>
          </button>
          <span class="text-cyan-400 font-bold text-sm uppercase">${level.years}</span>
          <div class="w-8"></div>
        </div>
        <div class="flex-1 overflow-hidden relative">${content}</div>
      `;
    }

    // --- РЕНДЕРЫ МИНИ-ИГР ---

    // MCQ
    function renderMCQ(data) {
      if (!state.mcqOptions) {
        state.mcqOptions = shuffle([...data.options]); 
      }
      
      let optsHtml = state.mcqOptions.map((opt, idx) => {
        let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center justify-between ";
        let icon = '';
        if (!state.mcqAnswered) {
          btnClass += "border-slate-600 bg-slate-800 text-slate-200 hover:border-cyan-500";
        } else {
          if (opt === data.correctOption) {
            btnClass += "border-emerald-500 bg-emerald-900/30 text-emerald-400";
            icon = '<i data-lucide="check" class="text-emerald-500 w-5 h-5 flex-shrink-0 ml-2"></i>';
          } else if (opt === state.mcqSelected) {
            btnClass += "border-red-500 bg-red-900/30 text-red-400";
            icon = '<i data-lucide="x" class="text-red-500 w-5 h-5 flex-shrink-0 ml-2"></i>';
          } else {
            btnClass += "border-slate-700 bg-slate-800/50 text-slate-500 opacity-50";
          }
        }
        return `<button ${state.mcqAnswered ? 'disabled' : ''} onclick="checkMCQ('${opt.replace(/'/g, "\\'")}')" class="${btnClass}"><span class="text-sm font-medium">${opt}</span>${icon}</button>`;
      }).join('');

      let resultHtml = '';
      if (state.mcqAnswered) {
        const isCorrect = state.mcqSelected === data.correctOption;
        resultHtml = `
          <div class="mt-6 p-4 rounded-xl flex gap-3 ${isCorrect ? 'bg-emerald-900/30 border border-emerald-800' : 'bg-red-900/30 border border-red-800'} animate-in slide-in-from-bottom-4">
             <i data-lucide="${isCorrect ? 'check' : 'x'}" class="${isCorrect ? 'text-emerald-400' : 'text-red-400'} mt-1"></i>
             <div>
               <h4 class="font-bold mb-1 ${isCorrect ? 'text-emerald-400' : 'text-red-400'}">${isCorrect ? 'Верно!' : 'Ошибка!'}</h4>
               <p class="text-sm text-slate-300">${data.explanation}</p>
             </div>
          </div>
          <button onclick="${isCorrect ? 'nextTask()' : 'resetMCQ()'}" class="mt-4 w-full font-bold py-4 rounded-xl ${isCorrect ? 'bg-cyan-600 text-white' : 'bg-slate-700 text-white'}">${isCorrect ? 'Дальше' : 'Попробовать снова'}</button>
        `;
      }

      return `
        <h3 class="text-lg font-bold text-slate-100 mb-6 leading-snug">${data.question}</h3>
        <div class="space-y-3 flex-1">${optsHtml}</div>
        ${resultHtml}
      `;
    }

    // Правда/Ложь
    function renderTF(data) {
      let resultHtml = '';
      if (state.tfAnswered !== null) {
        const isCorrect = state.tfAnswered;
        resultHtml = `
          <div class="mt-6 p-4 rounded-xl flex gap-3 ${isCorrect ? 'bg-emerald-900/30 border border-emerald-800' : 'bg-red-900/30 border border-red-800'} animate-in slide-in-from-bottom-4">
             <i data-lucide="${isCorrect ? 'check' : 'x'}" class="${isCorrect ? 'text-emerald-400' : 'text-red-400'} mt-1"></i>
             <div>
               <h4 class="font-bold mb-1 ${isCorrect ? 'text-emerald-400' : 'text-red-400'}">${isCorrect ? 'Верно!' : 'Ошибка!'}</h4>
               <p class="text-sm text-slate-300">${data.explanation}</p>
             </div>
          </div>
          <button onclick="${isCorrect ? 'nextTask()' : 'resetTF()'}" class="mt-4 w-full font-bold py-4 rounded-xl ${isCorrect ? 'bg-cyan-600 text-white' : 'bg-slate-700 text-white'}">${isCorrect ? 'Дальше' : 'Попробовать снова'}</button>
        `;
      }

      return `
        <div class="text-center mb-6"><span class="bg-slate-800 text-slate-400 text-xs px-3 py-1 rounded-full border border-slate-700">Правда или Ложь</span></div>
        <div class="bg-slate-800 p-8 rounded-2xl border-2 mb-8 flex items-center justify-center ${state.tfAnswered === true ? 'border-emerald-500/50' : state.tfAnswered === false ? 'border-red-500/50' : 'border-slate-700'}">
          <h3 class="text-xl font-medium text-center text-slate-100">«${data.statement}»</h3>
        </div>
        ${state.tfAnswered === null ? `
          <div class="flex gap-4">
            <button onclick="checkTF(false)" class="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-bold py-5 rounded-2xl flex flex-col items-center gap-2"><i data-lucide="x" class="text-red-400 w-8 h-8"></i>Ложь</button>
            <button onclick="checkTF(true)" class="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-bold py-5 rounded-2xl flex flex-col items-center gap-2"><i data-lucide="check" class="text-emerald-400 w-8 h-8"></i>Правда</button>
          </div>
        ` : resultHtml}
      `;
    }

    // Хронология
    function renderOrder(data) {
      if (state.orderAvailable.length === 0 && state.orderSelected.length === 0) {
        state.orderAvailable = shuffle(data.items.map((t, i) => ({ id: i, text: t })));
      }

      let slotsHtml = '';
      for (let i = 0; i < data.items.length; i++) {
        const item = state.orderSelected[i];
        if (item) {
          slotsHtml += `<div class="relative z-10 flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-full bg-slate-800 border-2 border-slate-600 flex items-center justify-center text-xs font-bold text-slate-400 shrink-0">${i+1}</div>
            <button ${state.orderProcessing ? 'disabled' : ''} onclick="deselectOrder(${item.id})" class="flex-1 p-3 rounded-xl text-left text-sm ${state.orderError ? 'bg-red-600/20 border-red-500/50 text-red-100' : 'bg-cyan-600/20 border-cyan-500/50 text-cyan-100 hover:bg-cyan-600/30'} border transition shadow-sm">${item.text}</button>
          </div>`;
        } else {
          slotsHtml += `<div class="relative z-10 flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-full bg-slate-800 border-2 border-slate-600 flex items-center justify-center text-xs font-bold text-slate-400 shrink-0">${i+1}</div>
            <div class="flex-1 border border-dashed border-slate-700 bg-slate-800/50 h-12 rounded-xl"></div>
          </div>`;
        }
      }

      let btnsHtml = state.orderAvailable.map(item => `
        <button ${state.orderProcessing ? 'disabled' : ''} onclick="selectOrder(${item.id})" class="bg-slate-800 border border-slate-600 hover:border-slate-400 px-4 py-3 rounded-xl text-sm text-slate-200 shadow-md disabled:opacity-50">${item.text}</button>
      `).join('');

      const isFull = state.orderSelected.length === data.items.length;
      return `
        <h3 class="text-lg font-bold text-center mb-6 text-slate-200">${data.question}</h3>
        <div class="mb-6 relative">
          <div class="absolute left-4 top-4 bottom-4 w-0.5 bg-slate-700 z-0"></div>
          ${slotsHtml}
        </div>
        <div class="flex-1 mt-auto">
          <p class="text-xs text-center mb-3 uppercase tracking-widest ${state.orderError ? 'text-red-400 animate-pulse' : 'text-slate-500'}">${state.orderError ? 'Ошибка! Запоминайте порядок...' : 'Нажми, чтобы выбрать'}</p>
          <div class="flex flex-wrap gap-2 justify-center">${btnsHtml}</div>
        </div>
        <button ${!isFull || state.orderProcessing ? 'disabled' : ''} onclick="checkOrder()" class="mt-6 w-full font-bold py-4 rounded-xl transition ${isFull && !state.orderProcessing ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}">Проверить</button>
      `;
    }

    // Сопоставление (Матчинг) с дистракторами
    function renderMatch(data) {
      if (state.matchTerms.length === 0) {
        const pairedData = data.pairs.map((p, i) => ({ ...p, id: i.toString() }));
        const termsArray = pairedData.map(p => ({ id: p.id, text: p.term }));
        let defsArray = pairedData.map(p => ({ id: p.id, text: p.def }));
        
        if (data.distractors) {
          const distDefs = data.distractors.map((text, i) => ({ id: `dist-${i}`, text: text }));
          defsArray = [...defsArray, ...distDefs];
        }
        
        state.matchTerms = shuffle(termsArray);
        state.matchDefs = shuffle(defsArray);
      }

      const drawColumn = (items, type) => items.map(item => {
        const isMatched = state.matchPairs.includes(item.id);
        const isSelected = (type === 'term' ? state.matchSelectedTerm : state.matchSelectedDef) === item.id;
        
        let cls = "p-3 rounded-xl text-left border transition-all " + (type === 'term' ? 'text-sm font-medium' : 'text-xs');
        if (isMatched) cls += " bg-emerald-900/50 border-emerald-800 text-emerald-400 opacity-60";
        else if (isSelected) cls += " bg-cyan-600 border-cyan-500 text-white shadow-lg scale-105 z-10";
        else if (state.matchError && isSelected) cls += " bg-red-600 border-red-500 text-white";
        else cls += " bg-slate-800 border-slate-600 text-slate-200 hover:border-slate-400";

        return `<button ${isMatched || state.matchProcessing ? 'disabled' : ''} onclick="clickMatch('${type}', '${item.id}')" class="${cls}">${item.text}</button>`;
      }).join('');

      return `
        <h3 class="text-base font-bold text-center mb-4 text-slate-200">${data.question}</h3>
        <div class="flex gap-3 flex-1 overflow-hidden ${state.matchError ? 'shake' : ''}">
          <div class="flex-1 flex flex-col gap-2 overflow-y-auto pr-1">${drawColumn(state.matchTerms, 'term')}</div>
          <div class="flex-1 flex flex-col gap-2 overflow-y-auto pl-1">${drawColumn(state.matchDefs, 'def')}</div>
        </div>
      `;
    }

    // --- ЛОГИКА (ГЛОБАЛЬНЫЕ ФУНКЦИИ) ---
    window.startLevel = (id) => {
      state.currentLevelId = id;
      state.view = 'level';
      state.phase = 'theory';
      state.step = 0;
      state.currentTaskIndex = 0;
      resetTaskState();
      render();
    };

    window.goMap = () => { state.view = 'map'; render(); };
    
    window.nextTheory = () => {
      const level = CAMPAIGN.find(l => l.id === state.currentLevelId);
      if (state.step < level.theory.length - 1) state.step++;
      else state.phase = 'tasks';
      render();
    };

    window.nextTask = () => {
      const level = CAMPAIGN.find(l => l.id === state.currentLevelId);
      resetTaskState();
      if (state.currentTaskIndex < level.tasks.length - 1) {
        state.currentTaskIndex++;
      } else {
        state.phase = 'result';
      }
      render();
    };

    window.finishLevel = () => {
      if (!state.completedLevels.includes(state.currentLevelId)) {
        state.completedLevels.push(state.currentLevelId);
      }
      state.view = 'map';
      render();
    };

    window.resetProgress = () => {
      if(confirm('Сбросить весь прогресс?')) {
        state.completedLevels = [];
        state.unlockedLevels = CAMPAIGN.map(level => level.id); 
        render();
      }
    };

    function resetTaskState() {
      state.mcqOptions = null; state.mcqAnswered = false; state.mcqSelected = null;
      state.tfAnswered = null; state.tfSelected = null;
      state.orderAvailable = []; state.orderSelected = []; state.orderError = false; state.orderProcessing = false;
      state.matchTerms = []; state.matchDefs = []; state.matchSelectedTerm = null; state.matchSelectedDef = null; state.matchPairs = []; state.matchError = false; state.matchProcessing = false;
    }

    // Экшены для MCQ
    window.checkMCQ = (opt) => {
      state.mcqSelected = opt;
      state.mcqAnswered = true;
      render();
    };
    window.resetMCQ = () => { state.mcqAnswered = false; state.mcqSelected = null; render(); };

    // Экшены для TF
    window.checkTF = (guess) => {
      const task = CAMPAIGN.find(l => l.id === state.currentLevelId).tasks[state.currentTaskIndex];
      state.tfAnswered = (guess === task.isTrue);
      render();
    };
    window.resetTF = () => { state.tfAnswered = null; render(); };

    // Экшены для Order
    window.selectOrder = (id) => {
      if(state.orderProcessing) return;
      const item = state.orderAvailable.find(i => i.id === id);
      state.orderAvailable = state.orderAvailable.filter(i => i.id !== id);
      state.orderSelected.push(item);
      render();
    };
    window.deselectOrder = (id) => {
      if(state.orderProcessing) return;
      const item = state.orderSelected.find(i => i.id === id);
      state.orderSelected = state.orderSelected.filter(i => i.id !== id);
      state.orderAvailable.push(item);
      render();
    };
    window.checkOrder = () => {
      if(state.orderProcessing) return;
      const task = CAMPAIGN.find(l => l.id === state.currentLevelId).tasks[state.currentTaskIndex];
      const isCorrect = state.orderSelected.every((item, idx) => item.text === task.items[idx]);
      if (isCorrect && state.orderSelected.length === task.items.length) {
        nextTask();
      } else {
        state.orderError = true;
        state.orderProcessing = true;
        render();
        setTimeout(() => {
          state.orderAvailable = shuffle([...state.orderAvailable, ...state.orderSelected]);
          state.orderSelected = [];
          state.orderError = false;
          state.orderProcessing = false;
          render();
        }, 1500);
      }
    };

    // Экшены для Match
    window.clickMatch = (type, id) => {
      if(state.matchProcessing) return;
      if (type === 'term') {
        state.matchSelectedTerm = state.matchSelectedTerm === id ? null : id;
      } else {
        state.matchSelectedDef = state.matchSelectedDef === id ? null : id;
      }
      
      if (state.matchSelectedTerm !== null && state.matchSelectedDef !== null) {
        state.matchProcessing = true;
        if (state.matchSelectedTerm === state.matchSelectedDef) {
          state.matchPairs.push(state.matchSelectedTerm);
          state.matchSelectedTerm = null;
          state.matchSelectedDef = null;
          state.matchProcessing = false;
          const task = CAMPAIGN.find(l => l.id === state.currentLevelId).tasks[state.currentTaskIndex];
          if (state.matchPairs.length === task.pairs.length) {
            setTimeout(nextTask, 500);
          }
        } else {
          state.matchError = true;
          render(); // Trigger shake
          setTimeout(() => {
            state.matchError = false;
            state.matchSelectedTerm = null;
            state.matchSelectedDef = null;
            state.matchProcessing = false;
            render();
          }, 500);
          return;
        }
      }
      render();
    };

    // Стартуем!
    render();
  </script>
</body>
</html>
